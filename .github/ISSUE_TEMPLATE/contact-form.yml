---
name: Contact Form Submission
description: This issue was created automatically by the contact form on the website
title: "[Contact] Form Submission"
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        **This issue was created automatically by the contact form.**
        It will be closed after the Telegram notification is sent.
  - type: input
    id: name
    attributes:
      label: Name
      description: The name entered in the contact form
      placeholder: John Doe
    validations:
      required: true
  - type: input
    id: email
    attributes:
      label: Email
      description: The email entered in the contact form
      placeholder: john@example.com
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Message
      description: The message content
      placeholder: I'd like to discuss a project...
    validations:
      required: true
