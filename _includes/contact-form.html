{% comment %}
  Contact Form - GitHub Issues + Telegram Integration
  El formulario envía datos a un Cloudflare Worker que notifica a Telegram.
  No expone el token del bot en el cliente.
{% endcomment %}
{% assign lang = page.lang | default: 'en' %}
<form id="contact-form" class="space-y-6" novalidate data-lang="{{ lang }}" data-worker-url="{{ site.data.contact.worker_url }}">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label for="name" class="block font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2">{% if lang == 'es' %}Nombre{% else %}Name{% endif %} *</label>
<input type="text" id="name" name="name" required
class="form-input w-full px-4 py-3 bg-surface border border-outline-variant/30 focus:border-secondary focus:ring-1 focus:ring-secondary/20 transition-colors font-body text-on-surface placeholder:text-on-surface-variant/70"
placeholder="{% if lang == 'es' %}Tu nombre{% else %}Your name{% endif %}"/>
</div>
<div>
<label for="email" class="block font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2">Email *</label>
<input type="email" id="email" name="email" required
class="form-input w-full px-4 py-3 bg-surface border border-outline-variant/30 focus:border-secondary focus:ring-1 focus:ring-secondary/20 transition-colors font-body text-on-surface placeholder:text-on-surface-variant/70"
placeholder="{% if lang == 'es' %}tu@email.com{% else %}your@email.com{% endif %}"/>
</div>
</div>

<div>
<label for="subject" class="block font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2">{% if lang == 'es' %}Asunto{% else %}Subject{% endif %}</label>
<input type="text" id="subject" name="subject"
class="form-input w-full px-4 py-3 bg-surface border border-outline-variant/30 focus:border-secondary focus:ring-1 focus:ring-secondary/20 transition-colors font-body text-on-surface placeholder:text-on-surface-variant/70"
placeholder="{% if lang == 'es' %}Consulta sobre proyecto{% else %}Project inquiry{% endif %}"/>
</div>

<div>
<label for="message" class="block font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2">{% if lang == 'es' %}Mensaje{% else %}Message{% endif %} *</label>
<textarea id="message" name="message" required rows="6"
class="form-textarea w-full px-4 py-3 bg-surface border border-outline-variant/30 focus:border-secondary focus:ring-1 focus:ring-secondary/20 transition-colors font-body text-on-surface resize-none placeholder:text-on-surface-variant/70"
placeholder="{% if lang == 'es' %}Contame sobre tu proyecto...{% else %}Tell me about your project...{% endif %}"></textarea>
</div>

<div class="flex items-center gap-4 justify-center">
<button type="submit"
class="bg-surface-container-highest text-on-surface px-12 py-4 font-body text-sm uppercase tracking-widest hover:bg-secondary-container hover:text-on-secondary-container transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
{% if lang == 'es' %}Enviar Mensaje{% else %}Send Message{% endif %}
</button>
<span id="form-status" class="font-label text-[10px] tracking-widest text-on-surface-variant" aria-live="polite"></span>
</div>
</form>
<script src="{{ site.baseurl }}/assets/js/contact-form.js" defer></script>
